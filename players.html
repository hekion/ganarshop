<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選手一覧から探す - GANAR SHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" style="position: absolute; left: 16px; color: #fff; text-decoration: none;">◁ TOP</a>
        <div>PLAYERS LIST</div>
    </header>

    <div class="page-explain-text">
        背番号を選択すると、その選手の応援グッズ・個別アイテムの一覧へ移動します。
    </div>

    <div class="player-tile-grid">
        <div class="player-tile-card" onclick="location.href='category.html?player=12'">
            <div class="tile-number">12</div>
            <div class="tile-info">
                <span class="tile-pos">SUPPORTER</span>
                <span class="tile-name">サポーター</span>
            </div>
        </div>
        <div class="player-tile-card" onclick="location.href='category.html?player=fukui'">
            <div class="tile-number">1</div>
            <div class="tile-info">
                <span class="tile-pos">GK</span>
                <span class="tile-name">福井</span>
            </div>
        </div>
        <div class="player-tile-card" onclick="location.href='category.html?player=sekino'">
            <div class="tile-number">2</div>
            <div class="tile-info">
                <span class="tile-pos">DF</span>
                <span class="tile-name">関野</span>
            </div>
        </div>
        <div class="player-tile-card"><div class="tile-number">3</div><div class="tile-info"><span class="tile-pos">DF</span><span class="tile-name">山田</span></div></div>
        <div class="player-tile-card"><div class="tile-number">4</div><div class="tile-info"><span class="tile-pos">DF</span><span class="tile-name">佐藤</span></div></div>
        <div class="player-tile-card"><div class="tile-number">5</div><div class="tile-info"><span class="tile-pos">DF</span><span class="tile-name">鈴木</span></div></div>
        <div class="player-tile-card"><div class="tile-number">6</div><div class="tile-info"><span class="tile-pos">MF</span><span class="tile-name">田中</span></div></div>
        <div class="player-tile-card"><div class="tile-number">7</div><div class="tile-info"><span class="tile-pos">MF</span><span class="tile-name">高橋</span></div></div>
        <div class="player-tile-card"><div class="tile-number">8</div><div class="tile-info"><span class="tile-pos">MF</span><span class="tile-name">渡辺</span></div></div>
        <div class="player-tile-card"><div class="tile-number">9</div><div class="tile-info"><span class="tile-pos">FW</span><span class="tile-name">小林</span></div></div>
        <div class="player-tile-card"><div class="tile-number">10</div><div class="tile-info"><span class="tile-pos">FW</span><span class="tile-name">中村</span></div></div>
        <div class="player-tile-card"><div class="tile-number">11</div><div class="tile-info"><span class="tile-pos">FW</span><span class="tile-name">伊藤</span></div></div>
    </div>

</body>
</html>
