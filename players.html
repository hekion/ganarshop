<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選手一覧 - GANAR SHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-holder"></div>

    <div class="page-body-header-flat">
        <a href="index.html" class="body-back-btn">◁ SHOP TOP</a>
        <h1 class="page-body-title">PLAYERS LIST</h1>
    </div>

    <div class="page-explain-text">
        選手を選択すると、応援グッズ・個別アイテムの一覧ページへ移動します。
    </div>

    <div class="player-photo-grid">
        <div class="player-photo-card" onclick="location.href='category.html?player=12'" style="background: linear-gradient(135deg, #0a192f, #172a45);">
            <div class="player-photo-inner">
                <span class="photo-pos-badge">SUPPORTER</span>
                <div class="photo-main-info"><span class="photo-num">12</span><span class="photo-name">サポーター</span></div>
            </div>
        </div>
        <div class="player-photo-card" onclick="location.href='category.html?player=fukui'" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6);">
            <div class="player-photo-inner">
                <span class="photo-pos-badge">GK</span>
                <div class="photo-main-info"><span class="photo-num">1</span><span class="photo-name">福井</span></div>
            </div>
        </div>
        <div class="player-photo-card" onclick="location.href='category.html?player=sekino'" style="background: linear-gradient(135deg, #0f172a, #00bfff);">
            <div class="player-photo-inner">
                <span class="photo-pos-badge">DF</span>
                <div class="photo-main-info"><span class="photo-num">2</span><span class="photo-name">関野</span></div>
            </div>
        </div>
    </div>

    <div id="footer-holder"></div>

    <script src="load-components.js"></script>
</body>
</html>
