<header>
    <div class="menu-trigger-btn" onclick="toggleMenu()">☰</div>
    <div class="header-logo-text" onclick="location.href='index.html'">GANAR OFFICIAL SHOP</div>
</header>

<div class="drawer-overlay" id="drawerMenu">

        <div class="drawer-close-btn" onclick="toggleMenu()">

            <span class="close-text">CLOSE</span>
        </div>
    </div>
    <div class="drawer-body">
        <div class="drawer-search-box">
            <input type="text" placeholder="キーワードを入力">
            <button class="drawer-search-submit">検索</button>
        </div>
        <div class="drawer-tag-container">
            <span class="drawer-capsule-tag" onclick="location.href='category.html?type=new'">NEWアイテム</span>

            <span class="drawer-capsule-tag">Tシャツ</span>

        <div class="drawer-mymenu-grid">
            <div class="mymenu-cell cell-black"><span class="cell-icon">📋</span><span class="cell-text">購入履歴</span></div>
            <div class="mymenu-cell cell-blue"><span class="cell-icon">👤</span><span class="cell-text">ログイン</span></div>
            <div class="mymenu-cell cell-gold"><span class="cell-icon">💳</span><span class="cell-text">決済情報</span></div>
            <div class="mymenu-cell cell-red"><span class="cell-icon">🛒</span><span class="cell-text">カートを見る</span></div>

        <div class="drawer-nav-list">
            <div class="drawer-nav-item" onclick="location.href='players.html'"><span>選手から選ぶ</span><span class="arrow">➔</span></div>
            <div class="drawer-nav-item" onclick="location.href='category.html?type=new'"><span>新着商品</span><span class="arrow">➔</span></div>
            <div class="drawer-nav-item" onclick="location.href='index.html#ranking'; toggleMenu();"><span>ランキング</span><span class="arrow">➔</span></div>
            <div class="drawer-nav-item"><span>お気に入り</span><span class="arrow">➔</span></div>
            <div class="drawer-nav-item item-sale"><span>SALE</span><span class="arrow">➔</span></div>
        </div>
    </div>
</div>
