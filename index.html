<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANAR OFFICIAL SHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>GANAR OFFICIAL SHOP</header>

    <div class="banner-container">
        NEW ARRIVAL: 2026 UNIFORM RELEASE
    </div>

    <div class="section-title">キーワードから探す</div>
    <div class="search-box">
        <input type="text" placeholder="グッズ名、選手名を入力...">
    </div>

    <div class="section-title">カテゴリから探す</div>
    <div class="horizontal-scroll">
        <div class="category-card" onclick="location.href='category.html?category=uniform'">
            <div class="category-icon">👕</div>
            <div class="card-label">ユニフォーム</div>
        </div>
        <div class="category-card" onclick="location.href='category.html?category=towel'">
            <div class="category-icon">🧣</div>
            <div class="card-label">タオル</div>
        </div>
        <div class="category-card" onclick="location.href='category.html?category=goods'">
            <div class="category-icon">🔑</div>
            <div class="card-label">雑貨・小物</div>
        </div>
    </div>

    <div class="section-title">選手から探す</div>
    <div class="horizontal-scroll">
        <div class="player-card" onclick="location.href='category.html?player=12'">
            <div class="player-avatar">12</div>
            <div class="card-label">サポーター</div>
        </div>
        <div class="player-card" onclick="location.href='category.html?player=fukui'">
            <div class="player-avatar">GK</div>
            <div class="card-label">福井 選手</div>
        </div>
        <div class="player-card" onclick="location.href='category.html?player=sekino'">
            <div class="player-avatar">DF</div>
            <div class="card-label">関野 選手</div>
        </div>
    </div>

</body>
</html>
