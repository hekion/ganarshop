<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品一覧 - GANAR SHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="index.html" style="position: absolute; left: 16px; color: #fff; text-decoration: none; font-weight: 700;">◁ SHOP</a>
        <div id="pageTitle">ITEMS</div>
    </header>

    <div class="category-info-bar">
        展示中のアイテム（全 8 件）
    </div>

    <div class="products-grid" style="margin-top: 10px; padding-bottom: 60px;">
        <div class="product-card">
            <div class="product-img">👕</div>
            <div class="product-name">オーセンティックユニフォーム 2026</div>
            <div class="product-price">¥12,000</div>
        </div>
        <div class="product-card">
            <div class="product-img">🧣</div>
            <div class="product-name">プレーヤーズマフラータオル</div>
            <div class="product-price">¥2,500</div>
        </div>
        <div class="product-card">
            <div class="product-img">👜</div>
            <div class="product-name">オフィシャルトートバッグ</div>
            <div class="product-price">¥3,800</div>
        </div>
        <div class="product-card">
            <div class="product-img">🎒</div>
            <div class="product-name">プレイヤーズバックパック</div>
            <div class="product-price">¥8,500</div>
        </div>
        <div class="product-card">
            <div class="product-img">🔑</div>
            <div class="product-name">GANAR アクリルキーホルダー</div>
            <div class="product-price">¥650</div>
        </div>
        <div class="product-card">
            <div class="product-img">📱</div>
            <div class="product-name">ロゴデザイン スマホケース</div>
            <div class="product-price">¥2,200</div>
        </div>
        <div class="product-card">
            <div class="product-img">🍼</div>
            <div class="product-name">チームスクイズボトル</div>
            <div class="product-price">¥1,500</div>
        </div>
        <div class="product-card">
            <div class="product-img">🧢</div>
            <div class="product-name">フラットバイザーキャップ</div>
            <div class="product-price">¥3,500</div>
        </div>
    </div>

    <script>
        // パラメータからタイトルをそれっぽく書き換える簡易スクリプト
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const cat = params.get('category');
        const player = params.get('player');
        const titleEl = document.getElementById('pageTitle');

        if(type === 'new') titleEl.innerText = "NEW ARRIVALS";
        else if(type === 'recommend') titleEl.innerText = "RECOMMEND ITEMS";
        else if(cat === 'uniform') titleEl.innerText = "UNIFORM";
        else if(cat === 'towel') titleEl.innerText = "TOWEL";
        else if(cat === 'goods') titleEl.innerText = "GOODS";
        else if(player) titleEl.innerText = "PLAYER GOODS";
    </script>
</body>
</html>
